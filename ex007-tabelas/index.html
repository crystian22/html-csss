<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        table{
            width: 350px;
            height: 350px;
            text-align: left;
            border-collapse: collapse;
            margin: auto;
            
        }

        td, th {
            border: 1px solid black;
            vertical-align: middle;
        }

        /*o vertical-align serve para alinhar o conteúdo das células verticalmente*/

        th {
            background-color: rgba(211, 211, 211, 0.425);
        }

        .linha {
            background-color: rgba(211, 211, 211, 0.425);
        }

        
        
    
    </style>
</head>
<body>


    <table>
        <tr>
            <th>Nome</th>
            
            <th>Idade</th>
            <th>estado</th>
        </tr>
        <tr>
            <td>João</td>
            <td>25</td>
            <td rowspan="2">são paulo</td>
            
        </tr>
        <tr class="linha">
            <td>maria</td>
            <td>30</td>
            
        </tr>
        <tr>
            <td>crystian</td>
            <td colspan="2">22</td>
            
        </tr>
    </table>

 
    
</body>
</html>
